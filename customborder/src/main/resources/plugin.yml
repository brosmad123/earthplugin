name: CustomBorder
version: 1.0.0
main: com.example.customborder.CustomBorderPlugin
api-version: '1.20'
author: YourName
description: Custom polygon-shaped world borders (4+ points, any shape)

commands:
  cborder:
    description: Manage the custom polygon world border
    usage: /cborder <add|remove|list|clear|enable|disable|particles|info>
    permission: customborder.admin
    aliases: [customborder]

permissions:
  customborder.admin:
    description: Allows managing the custom world border
    default: op
